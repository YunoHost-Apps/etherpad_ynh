#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  proxy_pass http://127.0.0.1:__PORT__/;
  proxy_pass_header  Server;
  proxy_buffering off;
  include proxy_params_no_auth;

  more_set_headers "Strict-Transport-Security: 'max-age=31536000; includeSubDomains' always";
  more_set_headers "X-Content-Type-Options: nosniff always";
  more_set_headers "X-Frame-Options: SAMEORIGIN";
  more_set_headers "Referrer-Policy: strict-origin-when-cross-origin always";

  client_max_body_size 50M;
}

location ~* __PATH__/p/[^/]*(_|%|\*)[^/]*/export/etherpad {
  return 404;
}

#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "etherpad"
name = "Etherpad"
description.en = "Collaborative editing in real-time"
description.fr = "Édition collaborative en temps réel"

version = "0.5.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "Apache-2.0"
website = "https://etherpad.org/"
demo = "https://video.etherpad.com/"
admindoc = "https://etherpad.org/doc/"
code = "https://github.com/ether/etherpad-go"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = ["arm64", "amd64"]
multi_instance = true

ldap = false
sso = false

disk = "20M"
ram.build = "90M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["ca", "de", "en", "es", "fr", "gl", "hu", "it", "nl", "pt"]
    default = "fr"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
    [resources.sources.main]
    rename = "etherpad"
    in_subdir = false
    extract = false
    amd64.url = "https://github.com/ether/etherpad-go/releases/download/v0.5.0/etherpad-go-linux-amd64"
    amd64.sha256 = "a29f05f606faee414169c45458fd3202292e79bd2445145776dff9dc68e44aca"
    arm64.url = "https://github.com/ether/etherpad-go/releases/download/v0.5.0/etherpad-go-linux-arm64"
    arm64.sha256 = "46cb1a32fbf4234d438adcd1e7ef331091a7173df9c589cb705ca2b8a3575479"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "*-amd64"
    autoupdate.asset.armhf = "*-arm64"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    #[resources.apt]
    #packages = "postgresql"

    #[resources.database]
    #type = "postgresql"

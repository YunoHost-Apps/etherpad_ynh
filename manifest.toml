#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "etherpad"
name = "Etherpad"
description.en = "Collaborative editing in real-time"
description.fr = "Édition collaborative en temps réel"

version = "3.3.2~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "Apache-2.0"
website = "https://etherpad.org/"
demo = "https://video.etherpad.com/"
admindoc = "https://etherpad.org/doc/v3.3.1/index.html"
code = "https://github.com/ether/etherpad-lite"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "200M"
ram.build = "2G"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["ca", "de", "en", "es", "fr", "gl", "hu", "it", "nl", "pt"]
    default = "fr"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
    [resources.sources.main]
    url = "https://github.com/ether/etherpad-lite/archive/refs/tags/3.3.2.tar.gz"
    sha256 = "9f9e754df505f29192c1391f01db378f1fd7af7b565117ba7f0d4a2e3885ddac"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false
    admin.url = "/admin"
    admin.auth_header = false
    admin.allowed = ["admins"]
    admin.show_tile = false
    
    [resources.ports]
    
    [resources.apt]
    packages = "libreoffice-writer"

    [resources.nodejs]
    version = "24"
